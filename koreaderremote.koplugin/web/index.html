<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0c0d0f">
  <title>KOReader Remote</title>

  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --background: #0c0d0f;
      --panel: #17191d;
      --panel-soft: #202329;
      --button: #272a30;
      --button-active: #353a43;
      --border: #474b54;
      --text: #f7f7f8;
      --muted: #b8bbc2;
      --success: #91e873;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--background);
      color: var(--text);
    }

    body {
      display: flex;
      min-height: 100svh;
      flex-direction: column;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    @supports (height: 100dvh) {
      body {
        height: 100dvh;
        min-height: 100dvh;
      }
    }

    button,
    summary {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      color: inherit;
      font: inherit;
    }

    #top {
      z-index: 20;
      flex: 0 0 auto;
      padding-top: max(0.55rem, env(safe-area-inset-top));
      background: var(--background);
    }

    #status {
      width: fit-content;
      max-width: calc(100% - 1.5rem);
      margin: 0 auto 0.6rem;
      overflow: hidden;
      padding: 0.42rem 0.78rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(24, 26, 30, 0.96);
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #status[data-online="true"]::before {
      content: "";
      display: inline-block;
      width: 0.62rem;
      height: 0.62rem;
      margin-right: 0.45rem;
      border-radius: 50%;
      background: var(--success);
      vertical-align: -0.02rem;
    }

    #device-controls {
      max-height: min(61dvh, 38rem);
      margin: 0 0.72rem 0.72rem;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 0.8rem;
      background: var(--panel);
      box-shadow: 0 0.45rem 1.3rem rgba(0, 0, 0, 0.2);
      overscroll-behavior: contain;
    }

    #device-controls:not([open]) {
      overflow: hidden;
    }

    summary {
      position: sticky;
      z-index: 2;
      top: 0;
      min-height: 3.35rem;
      padding: 0.95rem 1rem;
      cursor: pointer;
      background: var(--panel);
      font-size: 1.04rem;
      font-weight: 700;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    summary::before {
      content: "⚙";
      margin-right: 0.65rem;
      font-size: 1.05rem;
    }

    summary::after {
      content: "⌃";
      float: right;
      color: var(--muted);
      font-size: 1.15rem;
      transform: translateY(0.05rem);
    }

    #device-controls:not([open]) summary::after {
      content: "⌄";
    }

    .settings-body {
      padding: 0 0.78rem 0.78rem;
    }

    .setting-card {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 0.68rem;
      background: #15171a;
    }

    .simple-row,
    .setting-heading {
      display: flex;
      min-height: 3.25rem;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.78rem 0.82rem;
    }

    .simple-row + .setting-section,
    .setting-section + .setting-section,
    .setting-section + .simple-row,
    .simple-row + .simple-row {
      border-top: 1px solid var(--border);
    }

    .setting-label,
    .setting-heading strong {
      font-size: 0.98rem;
      font-weight: 560;
    }

    .setting-heading output {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .toggle-button {
      min-width: 5.4rem;
      min-height: 2.55rem;
      border: 1px solid var(--border);
      border-radius: 0.68rem;
      background: var(--button);
      cursor: pointer;
      font-weight: 700;
    }

    .toggle-button[aria-pressed="true"] {
      color: var(--success);
    }

    .setting-section {
      padding-bottom: 0.82rem;
    }

    .preset-grid {
      display: grid;
      gap: 0.48rem;
      padding: 0 0.82rem 0.72rem;
    }

    .preset-grid.brightness {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .preset-grid.warmth {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .preset-button {
      min-width: 0;
      min-height: 2.55rem;
      padding: 0.3rem 0.2rem;
      border: 1px solid var(--border);
      border-radius: 0.48rem;
      background: var(--button);
      cursor: pointer;
      font-size: 0.9rem;
      font-variant-numeric: tabular-nums;
      font-weight: 650;
    }

    .preset-button[aria-pressed="true"] {
      border-color: #747b88;
      background: #3a414d;
      box-shadow: inset 0 0 0 1px #596270;
    }

    .fine-control {
      display: grid;
      min-height: 3.35rem;
      margin: 0 0.82rem;
      overflow: hidden;
      grid-template-columns: 1fr 1.18fr 1fr;
      border: 1px solid var(--border);
      border-radius: 0.58rem;
    }

    .fine-button,
    .fine-value {
      display: flex;
      min-width: 0;
      min-height: 3.35rem;
      align-items: center;
      justify-content: center;
      border: 0;
      background: var(--button);
      font-size: 1.52rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .fine-button {
      cursor: pointer;
      touch-action: none;
    }

    .fine-button + .fine-value,
    .fine-value + .fine-button {
      border-left: 1px solid var(--border);
    }

    .fine-value {
      background: #1d2025;
      font-size: 1.12rem;
      font-weight: 650;
    }

    .fine-button:active,
    .preset-button:active,
    .toggle-button:active,
    #full-refresh:active {
      background: var(--button-active);
    }

    .fine-button:disabled {
      cursor: default;
      opacity: 0.35;
    }

    #full-refresh-row {
      padding: 0.78rem;
    }

    #full-refresh {
      width: 100%;
      min-height: 3rem;
      border: 1px solid var(--border);
      border-radius: 0.55rem;
      background: var(--button);
      cursor: pointer;
      font-weight: 650;
    }

    #full-refresh::before {
      content: "↻";
      margin-right: 0.55rem;
      font-size: 1.3rem;
      vertical-align: -0.08rem;
    }

    #remote {
      display: grid;
      min-height: 9rem;
      flex: 1 1 auto;
      grid-template-columns: 1fr 1fr;
      gap: 0.12rem;
      padding: 0 0.72rem max(0.72rem, env(safe-area-inset-bottom));
      background: var(--background);
    }

    .page-button {
      display: flex;
      min-width: 0;
      min-height: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border: 1px solid #373b43;
      border-radius: 0.72rem 0.72rem 0 0;
      background: linear-gradient(145deg, #25282e, #1b1d21);
      cursor: pointer;
    }

    .page-button:active {
      background: #373b43;
    }

    .page-arrow {
      font-size: clamp(5.5rem, 25vw, 10rem);
      font-weight: 240;
      line-height: 0.82;
    }

    .page-label {
      margin-top: clamp(0.8rem, 3vh, 1.9rem);
      color: var(--muted);
      font-size: clamp(0.88rem, 3.4vw, 1rem);
    }

    button:focus-visible,
    summary:focus-visible {
      outline: 3px solid #d8dce4;
      outline-offset: -3px;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 365px) {
      .preset-grid.brightness {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .preset-grid.warmth {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .preset-button {
        font-size: 0.82rem;
      }
    }

    @media (max-height: 630px) {
      #device-controls {
        max-height: 57dvh;
      }

      #status {
        margin-bottom: 0.42rem;
      }

      summary {
        min-height: 2.9rem;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }

      .simple-row,
      .setting-heading {
        min-height: 2.8rem;
        padding-top: 0.58rem;
        padding-bottom: 0.58rem;
      }

      .preset-button {
        min-height: 2.25rem;
      }

      .fine-control,
      .fine-button,
      .fine-value {
        min-height: 2.85rem;
      }
    }

    @media (orientation: landscape) {
      #device-controls {
        max-height: 58dvh;
      }

      .page-arrow {
        font-size: clamp(4.2rem, 15vw, 7rem);
      }

      .page-label {
        margin-top: 0.45rem;
      }
    }
  </style>
</head>

<body>
  <section id="top">
    <div id="status" role="status" data-online="false">Connecting…</div>

    <details id="device-controls" open hidden>
      <summary>Device settings</summary>

      <div class="settings-body">
        <div class="setting-card">
          <div class="simple-row" id="frontlight-row" hidden>
            <span class="setting-label">Front light</span>
            <button class="toggle-button" id="frontlight-toggle" type="button"
                    aria-pressed="false">Off</button>
          </div>

          <section class="setting-section" id="brightness-row" hidden>
            <div class="setting-heading">
              <strong>Brightness</strong>
              <output id="brightness-heading-value">50%</output>
            </div>

            <div class="preset-grid brightness" aria-label="Brightness presets">
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="1">1%</button>
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="10">10%</button>
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="25">25%</button>
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="50">50%</button>
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="75">75%</button>
              <button class="preset-button" type="button"
                      data-control="brightness" data-value="100">100%</button>
            </div>

            <div class="fine-control" aria-label="Fine brightness adjustment">
              <button class="fine-button" id="brightness-minus" type="button"
                      aria-label="Decrease brightness by one percent">−</button>
              <output class="fine-value" id="brightness-value">50%</output>
              <button class="fine-button" id="brightness-plus" type="button"
                      aria-label="Increase brightness by one percent">+</button>
            </div>
          </section>

          <section class="setting-section" id="warmth-row" hidden>
            <div class="setting-heading">
              <strong>Warmth</strong>
              <output id="warmth-heading-value">0%</output>
            </div>

            <div class="preset-grid warmth" aria-label="Warmth presets">
              <button class="preset-button" type="button"
                      data-control="warmth" data-value="0">0%</button>
              <button class="preset-button" type="button"
                      data-control="warmth" data-value="25">25%</button>
              <button class="preset-button" type="button"
                      data-control="warmth" data-value="50">50%</button>
              <button class="preset-button" type="button"
                      data-control="warmth" data-value="75">75%</button>
              <button class="preset-button" type="button"
                      data-control="warmth" data-value="100">100%</button>
            </div>

            <div class="fine-control" aria-label="Fine warmth adjustment">
              <button class="fine-button" id="warmth-minus" type="button"
                      aria-label="Decrease warmth by one percent">−</button>
              <output class="fine-value" id="warmth-value">0%</output>
              <button class="fine-button" id="warmth-plus" type="button"
                      aria-label="Increase warmth by one percent">+</button>
            </div>
          </section>

          <div class="simple-row" id="night-mode-row" hidden>
            <span class="setting-label">Night mode</span>
            <button class="toggle-button" id="night-mode-toggle" type="button"
                    aria-pressed="false">Off</button>
          </div>

          <div id="full-refresh-row" hidden>
            <button id="full-refresh" type="button">Full screen refresh</button>
          </div>
        </div>
      </div>
    </details>
  </section>

  <main id="remote" aria-label="KOReader page-turn remote">
    <button class="page-button" id="previous" type="button"
            aria-label="Previous page">
      <span class="page-arrow" aria-hidden="true">‹</span>
      <span class="page-label">Previous page</span>
    </button>

    <button class="page-button" id="next" type="button"
            aria-label="Next page">
      <span class="page-arrow" aria-hidden="true">›</span>
      <span class="page-label">Next page</span>
    </button>
  </main>

  <script>
    const HOLD_DELAY_MS = 500;
    const SEND_DELAY_MS = 170;
    const REPEAT_PHASES = [
      { until: 1500, interval: 420 },
      { until: 3000, interval: 320 },
      { until: Infinity, interval: 230 },
    ];

    const statusElement = document.getElementById("status");
    const deviceControlsElement = document.getElementById("device-controls");
    const frontlightRow = document.getElementById("frontlight-row");
    const brightnessRow = document.getElementById("brightness-row");
    const warmthRow = document.getElementById("warmth-row");
    const nightModeRow = document.getElementById("night-mode-row");
    const fullRefreshRow = document.getElementById("full-refresh-row");
    const frontlightToggle = document.getElementById("frontlight-toggle");
    const nightModeToggle = document.getElementById("night-mode-toggle");

    const controls = {
      brightness: {
        min: 1,
        max: 100,
        value: 50,
        endpoint: "/api/v1/brightness",
        heading: document.getElementById("brightness-heading-value"),
        valueElement: document.getElementById("brightness-value"),
        minus: document.getElementById("brightness-minus"),
        plus: document.getElementById("brightness-plus"),
        sendTimer: null,
        sending: false,
        queuedValue: null,
      },
      warmth: {
        min: 0,
        max: 100,
        value: 0,
        endpoint: "/api/v1/warmth",
        heading: document.getElementById("warmth-heading-value"),
        valueElement: document.getElementById("warmth-value"),
        minus: document.getElementById("warmth-minus"),
        plus: document.getElementById("warmth-plus"),
        sendTimer: null,
        sending: false,
        queuedValue: null,
      },
    };

    let pageRequestRunning = false;
    let reconnectTimer = null;
    let failedPings = 0;
    let capabilities = null;
    let deviceState = null;
    let activeHold = null;

    function clamp(value, minimum, maximum) {
      return Math.max(minimum, Math.min(maximum, value));
    }

    function setStatus(text, online = false) {
      statusElement.textContent = text;
      statusElement.dataset.online = online ? "true" : "false";
    }

    function scheduleConnectionCheck(delay) {
      window.clearTimeout(reconnectTimer);
      reconnectTimer = window.setTimeout(checkConnection, delay);
    }

    async function fetchWithTimeout(path, options = {}, timeout = 5000) {
      if (typeof AbortController === "undefined") {
        return fetch(path, options);
      }

      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), timeout);

      try {
        return await fetch(path, {
          ...options,
          signal: controller.signal,
        });
      } finally {
        window.clearTimeout(timer);
      }
    }

    async function readJSON(response) {
      let payload = null;

      try {
        payload = await response.json();
      } catch (error) {
        console.debug("KOReader Remote returned no JSON:", error);
      }

      if (!response.ok) {
        const message = payload && payload.message
          ? payload.message
          : "HTTP " + response.status;
        const requestError = new Error(message);
        requestError.payload = payload;
        throw requestError;
      }

      return payload;
    }

    async function getJSON(path) {
      const response = await fetchWithTimeout(path, {
        method: "GET",
        cache: "no-store",
      });
      return readJSON(response);
    }

    async function postJSON(path) {
      const response = await fetchWithTimeout(path, {
        method: "POST",
        cache: "no-store",
      });
      return readJSON(response);
    }

    function setToggle(button, enabled) {
      button.setAttribute("aria-pressed", enabled ? "true" : "false");
      button.textContent = enabled ? "On" : "Off";
    }

    function readSettingsOpenPreference() {
      try {
        return localStorage.getItem("koreaderRemoteSettingsOpen") !== "false";
      } catch (error) {
        return true;
      }
    }

    function saveSettingsOpenPreference() {
      try {
        localStorage.setItem(
          "koreaderRemoteSettingsOpen",
          deviceControlsElement.open ? "true" : "false"
        );
      } catch (error) {
        console.debug("Could not store settings disclosure state:", error);
      }
    }

    deviceControlsElement.addEventListener(
      "toggle",
      saveSettingsOpenPreference
    );

    function updatePresetState(name) {
      document.querySelectorAll(
        '.preset-button[data-control="' + name + '"]'
      ).forEach((button) => {
        const selected = Number(button.dataset.value) === controls[name].value;
        button.setAttribute("aria-pressed", selected ? "true" : "false");
      });
    }

    function renderControl(name) {
      const control = controls[name];
      const text = Math.round(control.value) + "%";

      control.heading.textContent = text;
      control.valueElement.textContent = text;
      control.minus.disabled = control.value <= control.min;
      control.plus.disabled = control.value >= control.max;
      updatePresetState(name);
    }

    function applyLocalValue(name, value) {
      const control = controls[name];
      control.value = clamp(
        Math.round(Number(value)),
        control.min,
        control.max
      );
      renderControl(name);
      return control.value;
    }

    async function flushControlValue(name) {
      const control = controls[name];

      window.clearTimeout(control.sendTimer);
      control.sendTimer = null;

      if (control.sending || control.queuedValue === null) {
        return;
      }

      const value = control.queuedValue;
      control.queuedValue = null;
      control.sending = true;

      try {
        const payload = await postJSON(
          control.endpoint + "?value=" + encodeURIComponent(value)
        );

        if (control.queuedValue === null && payload && payload.state) {
          applyDeviceState(payload.state);
        }

        setStatus("Connected", true);
        scheduleConnectionCheck(15000);
      } catch (error) {
        console.error("KOReader Remote value request failed:", error);
        setStatus(error.message || "Control failed", false);
        scheduleConnectionCheck(1600);
      } finally {
        control.sending = false;

        if (control.queuedValue !== null) {
          window.setTimeout(() => flushControlValue(name), 0);
        }
      }
    }

    function queueControlValue(name, value, immediate = false) {
      const control = controls[name];
      control.queuedValue = value;

      window.clearTimeout(control.sendTimer);

      if (immediate) {
        control.sendTimer = null;
        flushControlValue(name);
      } else {
        control.sendTimer = window.setTimeout(
          () => flushControlValue(name),
          SEND_DELAY_MS
        );
      }
    }

    function setControlValue(name, value, immediate = false) {
      const acceptedValue = applyLocalValue(name, value);
      queueControlValue(name, acceptedValue, immediate);
    }

    function adjustControl(name, delta, immediate = false) {
      setControlValue(
        name,
        controls[name].value + delta,
        immediate
      );
    }

    function finaliseControl(name) {
      queueControlValue(name, controls[name].value, true);
    }

    function applyCapabilities(nextCapabilities) {
      capabilities = nextCapabilities || {};

      frontlightRow.hidden = !capabilities.frontlight;
      brightnessRow.hidden = !capabilities.brightness;
      warmthRow.hidden = !capabilities.warmth;
      nightModeRow.hidden = !capabilities.night_mode;
      fullRefreshRow.hidden = !capabilities.full_refresh;

      const hasControls = Boolean(
        capabilities.frontlight
        || capabilities.brightness
        || capabilities.warmth
        || capabilities.night_mode
        || capabilities.full_refresh
      );

      deviceControlsElement.hidden = !hasControls;

      if (hasControls) {
        deviceControlsElement.open = readSettingsOpenPreference();
      }
    }

    function applyDeviceState(nextState) {
      deviceState = nextState || {};

      if (typeof deviceState.frontlight_on === "boolean") {
        setToggle(frontlightToggle, deviceState.frontlight_on);
      }

      if (typeof deviceState.brightness === "number") {
        applyLocalValue("brightness", deviceState.brightness);
      }

      if (typeof deviceState.warmth === "number") {
        applyLocalValue("warmth", deviceState.warmth);
      }

      if (typeof deviceState.night_mode === "boolean") {
        setToggle(nightModeToggle, deviceState.night_mode);
      }
    }

    async function loadCapabilities() {
      const payload = await getJSON("/api/v1/capabilities");
      applyCapabilities(payload.capabilities);
    }

    async function loadDeviceState() {
      const payload = await getJSON("/api/v1/device-state");
      applyDeviceState(payload.state);
    }

    async function checkConnection() {
      try {
        const info = await getJSON("/api/ping");
        failedPings = 0;

        if (!capabilities) {
          await loadCapabilities();
        }

        await loadDeviceState();

        if (info.document_open === false) {
          setStatus("Open a book on your reader", true);
        } else {
          setStatus("Connected · v" + info.version, true);
        }

        scheduleConnectionCheck(15000);
      } catch (error) {
        failedPings += 1;
        console.debug("KOReader Remote reconnect check failed:", error);

        if (failedPings >= 5) {
          setStatus("Connection lost · scan the QR code again", false);
        } else {
          setStatus("Reconnecting…", false);
        }

        scheduleConnectionCheck(3000);
      }
    }

    async function pageRequest(path, label) {
      if (pageRequestRunning) {
        return;
      }

      pageRequestRunning = true;
      setStatus(label + "…", false);

      try {
        const response = await fetchWithTimeout(path, {
          method: "GET",
          cache: "no-store",
        });

        if (response.status === 409) {
          const problem = await response.json();

          if (problem.error === "NO_DOCUMENT_OPEN") {
            setStatus("Open a book on your reader", true);
            scheduleConnectionCheck(3000);
            return;
          }
        }

        await readJSON(response);
        failedPings = 0;
        setStatus("Connected", true);
        scheduleConnectionCheck(15000);

        if (navigator.vibrate) {
          navigator.vibrate(15);
        }
      } catch (error) {
        console.error("KOReader Remote page request failed:", error);
        setStatus("Reconnecting…", false);
        scheduleConnectionCheck(2000);
      } finally {
        pageRequestRunning = false;
      }
    }

    async function controlRequest(path, label) {
      setStatus(label + "…", false);

      try {
        const payload = await postJSON(path);

        if (payload && payload.state) {
          applyDeviceState(payload.state);
        }

        setStatus("Connected", true);
        scheduleConnectionCheck(15000);
      } catch (error) {
        console.error("KOReader Remote control request failed:", error);
        const code = error.payload && error.payload.error;

        if (code === "NOT_SUPPORTED") {
          capabilities = null;
          setStatus("Feature not supported", false);
          window.setTimeout(checkConnection, 700);
        } else {
          setStatus(error.message || "Control failed", false);
          scheduleConnectionCheck(2500);
        }
      }
    }

    function previousPage() {
      pageRequest("/api/previous", "Previous page");
    }

    function nextPage() {
      pageRequest("/api/next", "Next page");
    }

    function repeatInterval(elapsed) {
      for (const phase of REPEAT_PHASES) {
        if (elapsed < phase.until) {
          return phase.interval;
        }
      }

      return REPEAT_PHASES[REPEAT_PHASES.length - 1].interval;
    }

    function stopActiveHold(finalise = true) {
      if (!activeHold) {
        return;
      }

      window.clearTimeout(activeHold.timer);
      const name = activeHold.name;
      activeHold = null;

      if (finalise) {
        finaliseControl(name);
      }
    }

    function scheduleHoldStep() {
      if (!activeHold) {
        return;
      }

      const elapsed = performance.now() - activeHold.startedAt;
      activeHold.timer = window.setTimeout(() => {
        if (!activeHold) {
          return;
        }

        const { name, delta } = activeHold;
        const previousValue = controls[name].value;
        adjustControl(name, delta, false);

        if (controls[name].value === previousValue) {
          stopActiveHold(true);
          return;
        }

        scheduleHoldStep();
      }, repeatInterval(elapsed));
    }

    function startFineAdjustment(event, name, delta) {
      if (event.button !== undefined && event.button !== 0) {
        return;
      }

      event.preventDefault();
      stopActiveHold(false);

      const previousValue = controls[name].value;
      adjustControl(name, delta, false);

      if (controls[name].value === previousValue) {
        finaliseControl(name);
        return;
      }

      activeHold = {
        name,
        delta,
        pointerId: event.pointerId,
        startedAt: performance.now(),
        timer: window.setTimeout(() => {
          if (!activeHold) {
            return;
          }

          const valueBeforeRepeat = controls[name].value;
          adjustControl(name, delta, false);

          if (controls[name].value === valueBeforeRepeat) {
            stopActiveHold(true);
            return;
          }

          scheduleHoldStep();
        }, HOLD_DELAY_MS),
      };
    }

    function installFineButton(button, name, delta) {
      button.addEventListener("pointerdown", (event) => {
        startFineAdjustment(event, name, delta);
      });

      button.addEventListener("pointerleave", () => {
        stopActiveHold(true);
      });

      button.addEventListener("click", (event) => {
        if (event.detail === 0) {
          adjustControl(name, delta, true);
        }
      });
    }

    installFineButton(controls.brightness.minus, "brightness", -1);
    installFineButton(controls.brightness.plus, "brightness", 1);
    installFineButton(controls.warmth.minus, "warmth", -1);
    installFineButton(controls.warmth.plus, "warmth", 1);

    window.addEventListener("pointerup", (event) => {
      if (activeHold && event.pointerId === activeHold.pointerId) {
        stopActiveHold(true);
      }
    });

    window.addEventListener("pointercancel", (event) => {
      if (activeHold && event.pointerId === activeHold.pointerId) {
        stopActiveHold(true);
      }
    });

    window.addEventListener("blur", () => {
      stopActiveHold(true);
    });

    document.querySelectorAll(".preset-button").forEach((button) => {
      button.addEventListener("click", () => {
        setControlValue(
          button.dataset.control,
          Number(button.dataset.value),
          true
        );
      });
    });

    document.getElementById("previous")
      .addEventListener("click", previousPage);

    document.getElementById("next")
      .addEventListener("click", nextPage);

    frontlightToggle.addEventListener("click", () => {
      controlRequest("/api/v1/frontlight/toggle", "Front light");
    });

    nightModeToggle.addEventListener("click", () => {
      const enabled = !(deviceState && deviceState.night_mode === true);
      controlRequest(
        "/api/v1/night-mode?enabled=" + String(enabled),
        "Night mode"
      );
    });

    document.getElementById("full-refresh")
      .addEventListener("click", () => {
        controlRequest("/api/v1/full-refresh", "Screen refresh");
      });

    document.addEventListener("keydown", (event) => {
      if (
        event.target instanceof HTMLButtonElement
        || event.target instanceof HTMLInputElement
      ) {
        return;
      }

      if (event.key === "ArrowLeft") {
        previousPage();
      }

      if (event.key === "ArrowRight" || event.key === " ") {
        nextPage();
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        checkConnection();
      }
    });

    window.addEventListener("online", checkConnection);
    checkConnection();
  </script>
</body>
</html>
