name: Check and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Validate and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes lua5.1 zip

      - name: Validate plugin and build release files
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(tr -d '[:space:]' < VERSION)"
          ARCHIVE="koreaderremote-v${VERSION}.zip"

          test -n "${VERSION}"
          test -f koreaderremote.koplugin/_meta.lua
          test -f koreaderremote.koplugin/main.lua
          test -f koreaderremote.koplugin/web/index.html

          luac5.1 -p koreaderremote.koplugin/_meta.lua
          luac5.1 -p koreaderremote.koplugin/main.lua

          grep -Fq "local VERSION = \"${VERSION}\""             koreaderremote.koplugin/main.lua

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]             && [[ "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${VERSION}."
            exit 1
          fi

          mkdir -p dist
          zip -r "dist/${ARCHIVE}" koreaderremote.koplugin

          (
            cd dist
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          )

      - name: Upload build files
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build files
        uses: actions/download-artifact@v4
        with:
          name: release-files
          path: dist

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          RELEASE_FLAGS=(--latest)

          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            RELEASE_FLAGS=(--prerelease)
          fi

          gh release create "${GITHUB_REF_NAME}"             dist/*             --verify-tag             --title "KOReader Remote ${GITHUB_REF_NAME}"             --generate-notes             "${RELEASE_FLAGS[@]}"
